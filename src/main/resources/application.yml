server:
  port: 8080

spring:
  application:
    name: oracle-bench

  datasource:
    url: jdbc:oracle:thin:@//localhost:1521/FREEPDB1
    username: corso
    password: Corso2026
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      pool-name: oracle-bench-pool
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000

  # Run schema.sql at startup to (re)create bench_customers.
  # continue-on-error lets restarts succeed even if the table already exists.
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:schema.sql

# One-click "Avvia setup" (pulsante in alto a destra). I valori sotto sono i default:
# adattali all'edizione in uso (Strada B / 19c: container: oracle19c, service: ORCLPDB1).
oracle-bench:
  setup:
    container: oracle-corso      # nome del container Docker
    service: FREEPDB1            # service name / PDB (ORCLPDB1 sull'immagine 19c)
    docker-path: docker         # percorso del CLI docker (dev'essere nel PATH dell'app)
    system-user: system
    system-password: Corso2026
    app-user: corso
    app-password: Corso2026
    tuner-user: tuner
    tuner-password: Corso2026#
    seed-rows: 50000            # righe di test caricate in bench_customers
    require-demo-schemas: true  # blocca il setup se HR/SH non sono installati

logging:
  level:
    com.example.oraclebench: INFO
    # Uncomment to inspect the raw Hikari pool lifecycle
    # com.zaxxer.hikari: DEBUG
